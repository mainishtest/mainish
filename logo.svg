<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg1" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFA500"/>
      <stop offset="20%" stop-color="#FF5722"/>
      <stop offset="45%" stop-color="#E6194B"/>
      <stop offset="70%" stop-color="#9C27B0"/>
      <stop offset="100%" stop-color="#3A0CA3"/>
    </linearGradient>
    <radialGradient id="g1" cx="75%" cy="15%" r="45%">
      <stop offset="0%" stop-color="#FFB74D" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="25%" cy="85%" r="45%">
      <stop offset="0%" stop-color="#4A0E8F" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="85%" cy="85%" r="35%">
      <stop offset="0%" stop-color="#E6194B" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="clip">
      <rect width="512" height="512" rx="96"/>
    </clipPath>
    <filter id="sf">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g clip-path="url(#clip)">
    <!-- Galaxy background -->
    <rect width="512" height="512" fill="url(#bg1)"/>
    <rect width="512" height="512" fill="url(#g1)"/>
    <rect width="512" height="512" fill="url(#g2)"/>
    <rect width="512" height="512" fill="url(#g3)"/>

    <!-- Small stars -->
    <g fill="#fff" filter="url(#sf)" opacity="0.85">
      <circle cx="72" cy="55" r="1.5"/><circle cx="145" cy="115" r="1.1"/>
      <circle cx="40" cy="175" r="1.4"/><circle cx="195" cy="48" r="1"/>
      <circle cx="345" cy="75" r="1.5"/><circle cx="415" cy="42" r="1.2"/>
      <circle cx="455" cy="115" r="1.6"/><circle cx="475" cy="195" r="1"/>
      <circle cx="385" cy="155" r="1.3"/><circle cx="95" cy="245" r="1.2"/>
      <circle cx="45" cy="315" r="1.5"/><circle cx="125" cy="375" r="1.1"/>
      <circle cx="65" cy="425" r="1.6"/><circle cx="165" cy="455" r="1"/>
      <circle cx="245" cy="415" r="1.4"/><circle cx="315" cy="455" r="1.2"/>
      <circle cx="395" cy="435" r="1.6"/><circle cx="455" cy="375" r="1.1"/>
      <circle cx="435" cy="295" r="1.4"/><circle cx="485" cy="445" r="1"/>
      <circle cx="275" cy="95" r="1.1"/><circle cx="225" cy="195" r="0.9"/>
      <circle cx="365" cy="245" r="1.2"/><circle cx="295" cy="335" r="1"/>
      <circle cx="155" cy="295" r="1.3"/><circle cx="255" cy="265" r="1.2"/>
      <circle cx="335" cy="375" r="1.1"/><circle cx="465" cy="255" r="0.9"/>
      <circle cx="25" cy="95" r="1"/><circle cx="205" cy="345" r="0.8"/>
    </g>
    <!-- Bright stars -->
    <g fill="#fff" filter="url(#sf)" opacity="1">
      <circle cx="115" cy="85" r="2.4"/><circle cx="395" cy="95" r="2.6"/>
      <circle cx="55" cy="275" r="2.2"/><circle cx="445" cy="345" r="2.4"/>
      <circle cx="245" cy="175" r="1.9"/><circle cx="175" cy="435" r="2.1"/>
      <circle cx="345" cy="295" r="1.9"/><circle cx="85" cy="395" r="2.3"/>
      <circle cx="475" cy="165" r="2"/><circle cx="305" cy="45" r="2.2"/>
    </g>

    <!--
      White M with lightning-bolt left leg.
      The left leg extends to a very sharp point at bottom-left.
      The right side is a clean thick vertical bar.
    -->
    <path d="
      M 80,455
      L 158,92
      L 200,92
      L 262,252
      L 324,92
      L 402,92
      L 402,408
      L 352,408
      L 352,188
      L 262,318
      L 172,188
      L 80,455
      Z
    " fill="white"/>
  </g>
</svg>
