<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Multi-stop background: gold top-left, red top-right, teal center/bottom-left, orange bottom-right -->
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0C850"/>
      <stop offset="30%" stop-color="#E8A040"/>
      <stop offset="60%" stop-color="#2EB8A8"/>
      <stop offset="100%" stop-color="#1A9E9E"/>
    </linearGradient>
    <linearGradient id="bg2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8453C" stop-opacity="0.7"/>
      <stop offset="40%" stop-color="#E86840" stop-opacity="0.4"/>
      <stop offset="70%" stop-color="transparent" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="g1" cx="20%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#F5D76E" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="80%" cy="15%" r="40%">
      <stop offset="0%" stop-color="#E84040" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="50%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#28B0A0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g4" cx="85%" cy="85%" r="35%">
      <stop offset="0%" stop-color="#E8983C" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="clip">
      <rect width="512" height="512" rx="96"/>
    </clipPath>
    <filter id="sf">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sf2">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g clip-path="url(#clip)">
    <!-- Galaxy background: gold/yellow → teal + red overlay on right -->
    <rect width="512" height="512" fill="url(#bg1)"/>
    <rect width="512" height="512" fill="url(#bg2)"/>
    <rect width="512" height="512" fill="url(#g1)"/>
    <rect width="512" height="512" fill="url(#g2)"/>
    <rect width="512" height="512" fill="url(#g3)"/>
    <rect width="512" height="512" fill="url(#g4)"/>

    <!-- Small stars -->
    <g fill="#fff" filter="url(#sf)" opacity="0.8">
      <circle cx="72" cy="55" r="1.5"/><circle cx="145" cy="115" r="1.1"/>
      <circle cx="40" cy="175" r="1.4"/><circle cx="195" cy="48" r="1"/>
      <circle cx="345" cy="75" r="1.5"/><circle cx="415" cy="42" r="1.2"/>
      <circle cx="455" cy="115" r="1.6"/><circle cx="475" cy="195" r="1"/>
      <circle cx="385" cy="155" r="1.3"/><circle cx="95" cy="245" r="1.2"/>
      <circle cx="45" cy="315" r="1.5"/><circle cx="125" cy="375" r="1.1"/>
      <circle cx="65" cy="425" r="1.6"/><circle cx="165" cy="455" r="1"/>
      <circle cx="245" cy="415" r="1.4"/><circle cx="315" cy="455" r="1.2"/>
      <circle cx="395" cy="435" r="1.6"/><circle cx="455" cy="375" r="1.1"/>
      <circle cx="435" cy="295" r="1.4"/><circle cx="485" cy="445" r="1"/>
      <circle cx="275" cy="95" r="1.1"/><circle cx="225" cy="195" r="0.9"/>
      <circle cx="365" cy="245" r="1.2"/><circle cx="295" cy="335" r="1"/>
      <circle cx="155" cy="295" r="1.3"/><circle cx="255" cy="265" r="1.2"/>
      <circle cx="335" cy="375" r="1.1"/><circle cx="465" cy="255" r="0.9"/>
      <circle cx="25" cy="95" r="1"/><circle cx="205" cy="345" r="0.8"/>
    </g>
    <!-- Bright stars with cross-sparkle feel -->
    <g fill="#fff" filter="url(#sf2)" opacity="1">
      <circle cx="115" cy="85" r="2.6"/><circle cx="395" cy="95" r="2.8"/>
      <circle cx="55" cy="275" r="2.3"/><circle cx="445" cy="345" r="2.6"/>
      <circle cx="245" cy="175" r="2.1"/><circle cx="175" cy="435" r="2.3"/>
      <circle cx="345" cy="295" r="2.1"/><circle cx="85" cy="395" r="2.5"/>
      <circle cx="475" cy="165" r="2.2"/><circle cx="305" cy="45" r="2.4"/>
      <circle cx="420" cy="230" r="2.3"/><circle cx="260" cy="450" r="2"/>
      <circle cx="490" cy="80" r="2.1"/><circle cx="30" cy="440" r="2.2"/>
    </g>

    <!-- White M with lightning-bolt left leg -->
    <path d="
      M 80,455
      L 158,92
      L 200,92
      L 262,252
      L 324,92
      L 402,92
      L 402,408
      L 352,408
      L 352,188
      L 262,318
      L 172,188
      L 80,455
      Z
    " fill="white"/>
  </g>
</svg>
