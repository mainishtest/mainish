<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Base gradient: teal bottom-left → gold top → orange center → red right -->
    <linearGradient id="bg1" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1AADA0"/>
      <stop offset="30%" stop-color="#3BBF8E"/>
      <stop offset="50%" stop-color="#E0B840"/>
      <stop offset="75%" stop-color="#E87030"/>
      <stop offset="100%" stop-color="#E84040"/>
    </linearGradient>
    <!-- Red overlay on right side -->
    <linearGradient id="bg2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E83838" stop-opacity="0.8"/>
      <stop offset="35%" stop-color="#E86040" stop-opacity="0.5"/>
      <stop offset="65%" stop-color="transparent" stop-opacity="0"/>
    </linearGradient>
    <!-- Warm gold glow top-left -->
    <radialGradient id="g1" cx="25%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#F5D870" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <!-- Red glow top-right -->
    <radialGradient id="g2" cx="82%" cy="18%" r="40%">
      <stop offset="0%" stop-color="#E84040" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <!-- Teal glow bottom-left -->
    <radialGradient id="g3" cx="18%" cy="80%" r="45%">
      <stop offset="0%" stop-color="#20C0B0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <!-- Orange glow bottom-right -->
    <radialGradient id="g4" cx="80%" cy="80%" r="40%">
      <stop offset="0%" stop-color="#E89030" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <!-- Green-gold center glow -->
    <radialGradient id="g5" cx="45%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#48C880" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="clip">
      <rect width="512" height="512" rx="100"/>
    </clipPath>
    <filter id="sf">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sf2">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Noise texture for galaxy feel -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" seed="5" stitchTiles="stitch" result="n"/>
      <feColorMatrix type="saturate" values="0" in="n" result="mono"/>
      <feBlend in="SourceGraphic" in2="mono" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <g clip-path="url(#clip)">
    <!-- Galaxy background layers -->
    <rect width="512" height="512" fill="url(#bg1)"/>
    <rect width="512" height="512" fill="url(#bg2)"/>
    <rect width="512" height="512" fill="url(#g1)"/>
    <rect width="512" height="512" fill="url(#g2)"/>
    <rect width="512" height="512" fill="url(#g3)"/>
    <rect width="512" height="512" fill="url(#g4)"/>
    <rect width="512" height="512" fill="url(#g5)"/>

    <!-- Noise/grain overlay for galaxy texture -->
    <rect width="512" height="512" fill="url(#bg1)" filter="url(#noise)" opacity="0.3"/>

    <!-- Small dim stars -->
    <g fill="#fff" filter="url(#sf)" opacity="0.7">
      <circle cx="72" cy="55" r="1.5"/><circle cx="145" cy="115" r="1.1"/>
      <circle cx="40" cy="175" r="1.4"/><circle cx="195" cy="48" r="1"/>
      <circle cx="345" cy="75" r="1.5"/><circle cx="415" cy="42" r="1.2"/>
      <circle cx="455" cy="115" r="1.6"/><circle cx="475" cy="195" r="1"/>
      <circle cx="385" cy="155" r="1.3"/><circle cx="95" cy="245" r="1.2"/>
      <circle cx="45" cy="315" r="1.5"/><circle cx="125" cy="375" r="1.1"/>
      <circle cx="65" cy="425" r="1.6"/><circle cx="165" cy="455" r="1"/>
      <circle cx="245" cy="415" r="1.4"/><circle cx="315" cy="455" r="1.2"/>
      <circle cx="395" cy="435" r="1.6"/><circle cx="455" cy="375" r="1.1"/>
      <circle cx="435" cy="295" r="1.4"/><circle cx="485" cy="445" r="1"/>
      <circle cx="275" cy="95" r="1.1"/><circle cx="225" cy="195" r="0.9"/>
      <circle cx="365" cy="245" r="1.2"/><circle cx="295" cy="335" r="1"/>
      <circle cx="155" cy="295" r="1.3"/><circle cx="255" cy="265" r="1.2"/>
      <circle cx="335" cy="375" r="1.1"/><circle cx="465" cy="255" r="0.9"/>
      <circle cx="25" cy="95" r="1"/><circle cx="205" cy="345" r="0.8"/>
      <circle cx="180" cy="55" r="1.2"/><circle cx="310" cy="130" r="1"/>
      <circle cx="490" cy="310" r="1.3"/><circle cx="30" cy="390" r="1.1"/>
      <circle cx="350" cy="190" r="0.9"/><circle cx="140" cy="450" r="1.2"/>
      <circle cx="420" cy="480" r="1"/><circle cx="80" cy="140" r="1.1"/>
    </g>
    <!-- Bright sparkle stars -->
    <g fill="#fff" filter="url(#sf2)" opacity="1">
      <circle cx="115" cy="85" r="2.8"/><circle cx="395" cy="90" r="3"/>
      <circle cx="50" cy="275" r="2.5"/><circle cx="450" cy="350" r="2.8"/>
      <circle cx="245" cy="175" r="2.2"/><circle cx="170" cy="440" r="2.5"/>
      <circle cx="345" cy="295" r="2.3"/><circle cx="80" cy="400" r="2.7"/>
      <circle cx="475" cy="165" r="2.4"/><circle cx="305" cy="42" r="2.6"/>
      <circle cx="425" cy="225" r="2.5"/><circle cx="260" cy="455" r="2.2"/>
      <circle cx="490" cy="75" r="2.3"/><circle cx="28" cy="445" r="2.4"/>
      <circle cx="465" cy="450" r="2.2"/><circle cx="185" cy="190" r="2"/>
      <circle cx="350" cy="430" r="2.3"/><circle cx="55" cy="120" r="2.1"/>
    </g>

    <!-- White M with lightning-bolt left leg -->
    <path d="
      M 72,460
      L 160,88
      L 208,88
      L 268,265
      L 328,88
      L 376,88
      L 412,88
      L 412,420
      L 355,420
      L 355,195
      L 268,340
      L 178,195
      L 72,460
      Z
    " fill="white"/>
  </g>
</svg>
